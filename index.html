<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Fala Brito | Rio Negrinho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .noticia-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; transition: 0.3s; }
        .noticia-card:hover { box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.1); }
        .data-badge { background-color: #1e3a8a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        header { background: #1e3a8a; color: white; border-bottom: 4px solid #3b82f6; }
        footer { background: #0f172a; color: #94a3b8; }

        /* Estilos do Banner Ajustado 800x300 */
        .banner-container { 
            width: 100%; 
            max-width: 800px; /* Largura máxima */
            margin: 0 auto; /* Centraliza o banner */
            overflow: hidden; 
            position: relative; 
            background: #ddd; 
            aspect-ratio: 800 / 300; /* Mantém a proporção exata */
            border-radius: 8px; /* Opcional: arredonda as bordas do banner */
        }
        .banner-track { 
            display: flex; 
            transition: transform 0.5s ease-in-out; 
            height: 100%;
        }
        .banner-slide { 
            min-width: 100%; 
            height: 100%;
        }
        .banner-slide img { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover; /* Garante que a imagem preencha o espaço sem esticar */
        }
    </style>
</head>
<body>

    <header class="py-8 shadow-lg">
        <div class="container mx-auto text-center px-4">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase mb-2 italic">PORTAL FALA BRITO</h1>
            <p class="text-blue-200 text-sm font-bold tracking-widest uppercase">Notícia e Fé com a Voz de Rio Negrinho</p>
        </div>
    </header>

    <section class="mt-6 px-4">
        <div class="banner-container shadow-md">
            <div class="banner-track" id="bannerTrack"></div>
        </div>
    </section>

    <main class="container mx-auto max-w-4xl px-4 py-10 min-h-screen">
        <div id="feedNoticias" class="flex flex-col gap-12"></div>
    </main>

    <footer class="py-12 mt-12">
        <div class="container mx-auto text-center px-4">
            <h2 class="text-white text-xl font-bold mb-4">PORTAL FALA BRITO</h2>
            <p class="text-sm mb-6">Informação de qualidade e compromisso com o povo de Rio Negrinho/SC.</p>
            <p class="text-xs uppercase tracking-widest border-t border-slate-800 pt-8">© 2026 Jadir Brito - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="dados-noticias.js"></script>

    <script>
        let currentBannerIndex = 0;

        function iniciarSite() {
            carregarBanner();
            carregarNoticias();
            if (typeof imagensBanner !== 'undefined' && imagensBanner.length > 0) {
                setInterval(girarBanner, 5000); 
            }
        }

        function carregarBanner() {
            const track = document.getElementById('bannerTrack');
            if (typeof imagensBanner !== 'undefined') {
                track.innerHTML = imagensBanner.map(img => `
                    <div class="banner-slide">
                        <img src="${img}" alt="Publicidade Portal">
                    </div>
                `).join('');
            }
        }

        function girarBanner() {
            const track = document.getElementById('bannerTrack');
            currentBannerIndex++;
            if (currentBannerIndex >= imagensBanner.length) {
                currentBannerIndex = 0;
            }
            track.style.transform = `translateX(-${currentBannerIndex * 100}%)`;
        }

        function carregarNoticias() {
            const feed = document.getElementById('feedNoticias');
            if (typeof noticias !== 'undefined') {
                feed.innerHTML = noticias.map(n => `
                    <article class="noticia-card shadow-sm">
                        <div class="p-6 md:p-8">
                            <div class="flex justify-between items-center mb-4">
                                <span class="data-badge uppercase tracking-tighter">${n.data}</span>
                            </div>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-blue-900 mb-2 leading-tight">${n.titulo}</h2>
                        </div>

                        <img src="${n.imagem}" alt="${n.titulo}" class="w-full h-auto max-h-[450px] object-cover">
                        
                        <div class="p-6 md:p-8">
                            <div class="text-gray-700 leading-relaxed text-lg mb-6 whitespace-pre-wrap">${n.texto}</div>
                            <div class="flex items-center gap-2 pt-4 border-t border-gray-100 text-sm text-gray-500 italic">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                                <span>Postado por <strong>Jadir Brito</strong></span>
                            </div>
                        </div>
                    </article>
                `).join('');
            }
        }

        window.onload = iniciarSite;
    </script>
</body>
</html>

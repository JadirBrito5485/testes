        footer { background: #0f172a; color: #94a3b8; }

        @media (max-width: 640px) { .banner-container { aspect-ratio: 4 / 3; } }
        .banner-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .banner-slide { min-width: 100%; height: 100%; }

            border-radius: 6px;

    <script>
        // BLOQUEIO CONTRA CÓPIA (BLINDAGEM)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

        let currentBannerIndex = 0;

        function iniciarSite() {
            carregarBanner();
            carregarNoticias();
            if (typeof imagensBanner !== 'undefined' && imagensBanner.length > 0) { setInterval(girarBanner, 5000); }
        }

        function carregarBanner() {
            const track = document.getElementById('bannerTrack');
            if (typeof imagensBanner !== 'undefined') {
                track.innerHTML = imagensBanner.map(img => `<div class="banner-slide"><img src="${img}" alt="Publicidade"></div>`).join('');
            }
        }

        function girarBanner() {
            const track = document.getElementById('bannerTrack');
            if (track) {
                currentBannerIndex = (currentBannerIndex + 1) % imagensBanner.length;
                track.style.transform = `translateX(-${currentBannerIndex * 100}%)`;
            }
        }

        // COMPARTILHAMENTO MULTI-PLATAFORMA
        function compartilharNoticia(titulo) {
            const shareData = { 
                title: 'Portal Fala Brito', 
                text: `*${titulo.toUpperCase()}*\n\nConfira no Portal Fala Brito:`, 
                url: window.location.href 
            };
            if (navigator.share) {
                navigator.share(shareData).catch(console.error);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareData.text + ' ' + shareData.url)}`, '_blank');
            }
        }

        function carregarNoticias() {
            const feed = document.getElementById('feedNoticias');
            if (typeof noticias !== 'undefined') {
                feed.innerHTML = noticias.map(n => `
                    <article class="noticia-card shadow-sm">
                        <div class="p-6 md:p-8 border-b border-gray-50">
                            <span class="data-badge uppercase tracking-tighter mb-4 inline-block">${n.data}</span>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-blue-900 mb-2 leading-tight">${n.titulo}</h2>
                        </div>
                        
                        <img src="${n.imagem}" alt="${n.titulo}" class="w-full h-auto max-h-[450px] object-cover" oncontextmenu="return false;">
                        
                        <div class="p-6 md:p-8">
                            <div class="text-gray-700 leading-relaxed text-lg mb-8 whitespace-pre-wrap">${n.texto}</div>
                            
                            <div class="flex flex-wrap items-center justify-between gap-4 pt-6 border-t border-gray-100">
                                <div class="flex items-center gap-2 text-sm text-gray-500 italic">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                                    <span>Postado por <strong>Jadir Brito</strong></span>
                                </div>
                                
                                <button onclick="compartilharNoticia('${n.titulo.replace(/'/g, "\\'")}')" class="btn-share-discreto">
                                   <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                                   Compartilhar
                                </button>
                            </div>
                        </div>
                    </article>`).join('');
            }
        }
        window.onload = iniciarSite;
    </script>
